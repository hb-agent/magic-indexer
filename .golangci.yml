# golangci-lint v2 configuration
# See: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive
    - nilerr
    - errorlint
    - gosec       # Security-specific Go linter (SQL injection, weak crypto, etc.)
    - bodyclose   # Ensures HTTP response bodies are closed
  settings:
    govet:
      disable:
        - fieldalignment
        - shadow
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      # Exclude some linters from running on test files
      - path: '(.+)_test\.go'
        linters:
          - gocritic
          - unparam
          - errcheck
          - gosec       # Test files use hardcoded URLs, os.Setenv, etc.
      # defer Rollback is safe to ignore (Rollback is a no-op after Commit)
      - linters:
          - errcheck
        text: "Error return value of .*.Rollback.* is not checked"
      # G201: SQL string formatting — these use Placeholder() for bind
      # params, not user input. The fmt.Sprintf builds parameterized SQL.
      - linters:
          - gosec
        text: "G201"
      # G304: File inclusion via variable — these read from trusted paths
      # (testdata/ or lexicon directories configured by the operator).
      - linters:
          - gosec
        text: "G304"
      # G101: Hardcoded test DB credentials in testutil/db.go — these are
      # ephemeral CI-only credentials, not production secrets.
      - path: 'internal/testutil/'
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/GainForest/hypergoat
